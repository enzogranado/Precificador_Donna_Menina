<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c5a35e"/>
      <stop offset="100%" stop-color="#d6b2a6"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#c5a35e"/>
      <stop offset="50%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#fff5d6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" />
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="27" fill="#fdfcfb" opacity="0.92"/>
  <!-- Candle body -->
  <rect x="28" y="32" width="8" height="18" rx="2" fill="#d6b2a6" opacity="0.7"/>
  <!-- Wick -->
  <line x1="32" y1="32" x2="32" y2="24" stroke="#8b7355" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Flame -->
  <path d="M32 12 C28 18, 26 22, 32 26 C38 22, 36 18, 32 12Z" fill="url(#flame)" opacity="0.9"/>
  <!-- Inner flame glow -->
  <ellipse cx="32" cy="22" rx="2.5" ry="3.5" fill="#fff5d6" opacity="0.6"/>
  <!-- DM text -->
  <text x="32" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="8" font-weight="700" fill="#c5a35e" letter-spacing="1">DM</text>
</svg>